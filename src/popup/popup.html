<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="popupTitle">ViewTune</title>
    <link rel="stylesheet" href="../shared/theme.css">
    <link rel="stylesheet" href="popup.css">
    <script defer src="../shared/i18n.js"></script>
    <script defer src="../shared/constants.js"></script>
    <script defer src="../shared/shortcut-utils.js"></script>
    <script defer src="popup.js"></script>
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div class="brand-lockup">
          <div class="brand-row"><span class="vt-brand-mark" aria-hidden="true"></span><h1>ViewTune</h1></div>
          <p>Video pace &amp; frame</p>
        </div>
        <button id="open-options" class="icon-button" type="button" aria-label="ViewTune 설정 열기" data-i18n-aria-label="popupOpenSettings">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.25a3.25 3.25 0 1 0 0-6.5 3.25 3.25 0 0 0 0 6.5Z"></path>
            <path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.03-.66-.08-.98l2.11-1.65-2-3.46-2.61 1.05a7.6 7.6 0 0 0-1.7-.99L14.83 3h-4l-.4 2.97c-.61.25-1.18.58-1.7.99L6.12 5.91l-2 3.46 2.11 1.65c-.05.32-.08.65-.08.98s.03.66.08.98l-2.11 1.65 2 3.46 2.61-1.05c.52.41 1.09.74 1.7.99l.4 2.97h4l.39-2.97a7.6 7.6 0 0 0 1.7-.99l2.61 1.05 2-3.46-2.1-1.65Z"></path>
          </svg>
        </button>
      </header>

      <p id="status" class="status" aria-live="polite" data-i18n="popupCheckingTab">현재 탭을 확인하는 중…</p>
      <button id="reload-tab" class="reload-button" type="button" hidden data-i18n="popupReloadTab">이 탭 새로고침</button>

      <section id="controls" class="controls" aria-label="현재 비디오 제어" data-i18n-aria-label="popupControlsAria">
        <div class="speed-panel">
          <div class="control-heading">
            <span data-i18n="popupPlaybackSpeed">재생 속도</span>
            <button type="button" class="reset-button" data-action="speedReset">
              <span data-i18n="popupResetSpeed">1× 초기화</span> <kbd data-shortcut-for="speedReset">R</kbd>
            </button>
          </div>
          <div class="speed-control">
            <button type="button" class="step-button" data-action="speedDown" aria-label="재생 속도 0.5배 낮추기, 단축키 [">
              <span aria-hidden="true">−0.5</span>
              <kbd data-shortcut-for="speedDown">[</kbd>
            </button>
            <output id="rate" aria-label="현재 재생 속도" data-i18n-aria-label="popupCurrentRateAria" aria-live="polite">—</output>
            <button type="button" class="step-button" data-action="speedUp" aria-label="재생 속도 0.5배 높이기, 단축키 ]">
              <span aria-hidden="true">+0.5</span>
              <kbd data-shortcut-for="speedUp">]</kbd>
            </button>
          </div>
          <button type="button" class="target-button" data-action="speedTarget">
            <span id="target-rate-label">2× 바로 적용</span>
            <kbd data-shortcut-for="speedTarget">G</kbd>
          </button>
        </div>

        <div class="mode-panel">
          <div class="control-heading mode-heading">
            <span data-i18n="popupScreenModes">화면 모드</span>
            <span class="control-caption" data-i18n="popupIndependentToggles">독립 토글</span>
          </div>
          <div class="layout-row">
            <button type="button" class="layout-button" data-action="window" data-mode="window" aria-pressed="false">
              <span class="mode-copy">
                <strong data-i18n="actionWindow">창 맞춤</strong>
                <small data-i18n="popupWindowHint">플레이어 + 컨트롤</small>
              </span>
              <span class="mode-meta"><i aria-hidden="true"></i><kbd data-shortcut-for="window">V</kbd></span>
            </button>
            <button type="button" class="layout-button" data-action="wide" data-mode="wide" aria-pressed="false">
              <span class="mode-copy">
                <strong data-i18n="actionWide">21:9 확대</strong>
                <small data-i18n="popupWideHint">영상만 빈틈없이</small>
              </span>
              <span class="mode-meta"><i aria-hidden="true"></i><kbd data-shortcut-for="wide">B</kbd></span>
            </button>
          </div>
        </div>
      </section>

      <p id="runtime" class="runtime" hidden></p>
      <p id="installed-version" class="installed-version" data-i18n-aria-label="installedVersionAria" aria-label="설치된 ViewTune 버전">v—</p>
    </main>
  </body>
</html>
